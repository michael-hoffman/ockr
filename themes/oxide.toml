# ockr · Oxide theme (dark)
#
# Palette: warm near-blacks with ochre (#CC7722) accent.
# Every neutral carries a faint brown undertone so the ochre accent feels
# native to the surface instead of floating on cool zinc gray.
# Inspired by oxidised iron — warm but heavy.

name = "Oxide"
variant = "dark"

# ── Backgrounds ───────────────────────────────────────────────────────────────
bg_base    = "#0B0907"   # deepest background — body / root (warm black)
bg_panel   = "#16120E"   # editor and preview panel fill
bg_surface = "#1B1712"   # sidebar and window chrome
bg_hover   = "#241E17"   # subtle hover overlay

# ── Borders ───────────────────────────────────────────────────────────────────
border        = "#171310"   # primary border — barely-there on bg_base
border_subtle = "#2C251C"   # secondary dividers

# ── Accent (ochre) ────────────────────────────────────────────────────────────
ochre        = "#CC7722"   # full ochre — buttons, active indicators
ochre_dim    = "#4A2E12"   # ochre/35 — selection highlight
ochre_border = "#3D2508"   # ochre/20 — border-level accent

# ── Text ──────────────────────────────────────────────────────────────────────
text        = "#F5F0EA"   # primary text — warm near-white
text_muted  = "#A89F93"   # secondary text — warm stone
text_subtle = "#7A7163"   # tertiary / placeholder
text_faint  = "#57503F"   # barely-visible

# ── Mode indicator colours ────────────────────────────────────────────────────
mode_insert = "#528BFF"   # bright blue
mode_normal = "#CC7722"   # ochre (matches accent)
mode_visual = "#A855F7"   # purple

# ── Cursor ────────────────────────────────────────────────────────────────────
cursor_fg = "#0B0907"   # text colour on top of a block cursor fill

# ── Syntax highlighting ───────────────────────────────────────────────────────
syntax_heading  = "#F5F0EA"   # text — headings use full brightness
syntax_keyword  = "#CC7722"   # ochre — typst directives (#let, #set, …)
syntax_math     = "#528BFF"   # blue  — $inline$ and $block$ math
syntax_link     = "#A855F7"   # purple — [[wikilinks]]
syntax_code     = "#2DD4BF"   # teal  — `inline code`
syntax_comment  = "#57503F"   # text_faint — // comments

# ── Bracket match ──────────────────────────────────────────────────────────────
bracket_match_bg = "#3A2F1A"   # warm amber-tinted highlight for matching bracket
