[book]
title = "ockr manual"
authors = ["Michael Hoffman"]
description = "The manual for ockr — a Typst-native, keyboard-driven note editor."
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/michael-hoffman/ockr"
edit-url-template = "https://github.com/michael-hoffman/ockr/edit/main/manual/{path}"
site-url = "/ockr/manual/"

[output.html.fold]
enable = true
level = 1
